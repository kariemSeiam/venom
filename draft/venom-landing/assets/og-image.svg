<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050508;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g stroke="#1a1a25" stroke-width="1" opacity="0.5">
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  
  <!-- Central visualization -->
  <g transform="translate(600, 315)">
    <!-- Glow -->
    <circle r="150" fill="url(#cyanGlow)"/>
    
    <!-- Orbit rings -->
    <g stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.2">
      <ellipse rx="120" ry="120"/>
    </g>
    
    <!-- Orbiting particles -->
    <g fill="#00d4ff">
      <circle cy="-120" r="6"/>
      <circle cx="104" cy="-60" r="5"/>
      <circle cx="104" cy="60" r="6"/>
      <circle cy="120" r="5"/>
      <circle cx="-104" cy="60" r="6"/>
      <circle cx="-104" cy="-60" r="5"/>
    </g>
    
    <!-- Connection lines -->
    <g stroke="#00d4ff" stroke-width="1" opacity="0.3">
      <line y2="-120"/>
      <line x2="104" y2="-60"/>
      <line x2="104" y2="60"/>
      <line y2="120"/>
      <line x2="-104" y2="60"/>
      <line x2="-104" y2="-60"/>
    </g>
    
    <!-- Central node -->
    <circle r="15" fill="#00d4ff"/>
    <circle r="25" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Text -->
  <text x="600" y="520" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="400" fill="#e8e8f0">VENOM</text>
  <text x="600" y="570" text-anchor="middle" font-family="'Courier New', monospace" font-size="24" letter-spacing="8" fill="#00d4ff">NINE MINDS. ONE COHERENCE.</text>
  
  <!-- Corner accent -->
  <rect x="40" y="40" width="60" height="60" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  <rect x="1100" y="530" width="60" height="60" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
</svg>