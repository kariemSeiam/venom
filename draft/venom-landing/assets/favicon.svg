<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#0a0a0f"/>
  
  <!-- Glow effect -->
  <circle cx="50" cy="50" r="35" fill="url(#glow)"/>
  
  <!-- Central node -->
  <circle cx="50" cy="50" r="8" fill="#00d4ff"/>
  
  <!-- Orbiting particles -->
  <g fill="#00d4ff">
    <circle cx="50" cy="20" r="3"/>
    <circle cx="76" cy="32" r="2.5"/>
    <circle cx="76" cy="68" r="3"/>
    <circle cx="50" cy="80" r="2.5"/>
    <circle cx="24" cy="68" r="3"/>
    <circle cx="24" cy="32" r="2.5"/>
  </g>
  
  <!-- Connection lines -->
  <g stroke="#00d4ff" stroke-width="0.5" opacity="0.3">
    <line x1="50" y1="50" x2="50" y2="20"/>
    <line x1="50" y1="50" x2="76" y2="32"/>
    <line x1="50" y1="50" x2="76" y2="68"/>
    <line x1="50" y1="50" x2="50" y2="80"/>
    <line x1="50" y1="50" x2="24" y2="68"/>
    <line x1="50" y1="50" x2="24" y2="32"/>
  </g>
  
  <!-- Orbit rings -->
  <g stroke="#6b6b8a" stroke-width="0.5" fill="none" opacity="0.2">
    <ellipse cx="50" cy="50" rx="30" ry="30"/>
  </g>
</svg>